name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build
        working-directory: artifacts/engage-health
        env:
          PORT: 3000
          BASE_PATH: /
          VITE_WP_GRAPHQL_URL: https://manage.engagehealthgroup.co.uk/graphql
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}

      - name: Inject Companies House API Key
        run: sed -i 's|%%COMPANIES_HOUSE_KEY%%|${{ secrets.COMPANIES_HOUSE_KEY }}|g' artifacts/engage-health/dist/public/api/companies.php || true

      - name: Deploy dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "artifacts/engage-health/dist/public/*"
          target: "/home/fatmirshehu-engagehealthgroup/htdocs/engagehealthgroup.fatmirshehu.com"
          strip_components: 4
