kind = "web"
previewPath = "/"
title = "Engage Health Group"
version = "1.0.0"
id = "artifacts/engage-health"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24049
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/engage-health run dev"

[services.env]
PORT = "24049"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/engage-health", "run", "build"]
publicDir = "artifacts/engage-health/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
